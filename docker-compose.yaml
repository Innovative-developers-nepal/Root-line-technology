services:
  postgres:
    image: postgres:17-alpine
    container_name: rootline-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: rootline
      POSTGRES_DB: rootline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U rootline"]
    networks:
      - rootline-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rootline-api
    restart: unless-stopped
    expose:
      - "5000"
    env_file: ./apps/api/.env.docker
    environment:
      - DATABASE_URL=postgresql://rootline:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/rootline
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BETTER_AUTH_URL=http://api:5000
      - FRONTEND_URL=${PUBLIC_HOST:-http://localhost}
      - ADMIN_URL=${PUBLIC_HOST:-http://localhost}/admin
      - CORS_ORIGIN=${PUBLIC_HOST:-http://localhost}
      - BASE_URL=${PUBLIC_HOST:-http://localhost}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:?REVALIDATE_SECRET must be set}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
    networks:
      - rootline-net

  user:
    build:
      context: .
      dockerfile: apps/user/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_HOST:-http://localhost}/api
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_HOST:-http://localhost}
        NEXT_PUBLIC_POSTHOG_KEY: "${NEXT_PUBLIC_POSTHOG_KEY:-}"
        NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-}"
    container_name: rootline-user
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:?REVALIDATE_SECRET must be set}
      - GEO_LAT=${GEO_LAT:-}
      - GEO_LNG=${GEO_LNG:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    networks:
      - rootline-net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_HOST:-http://localhost}/api
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_HOST:-http://localhost}
        NEXT_PUBLIC_POSTHOG_KEY: "${NEXT_PUBLIC_POSTHOG_KEY:-}"
        NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-}"
    container_name: rootline-admin
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3001/admin"]
    networks:
      - rootline-net

  nginx:
    image: nginx:alpine
    container_name: rootline-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      user:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - rootline-net

volumes:
  postgres-data:
  uploads:

networks:
  rootline-net:
    driver: bridge
