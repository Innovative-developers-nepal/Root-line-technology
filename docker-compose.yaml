services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      user:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - rootline-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    expose:
      - "5000"
    env_file: ./apps/api/.env.docker
    environment:
      # override env_file values that depend on docker networking + public host
      - BETTER_AUTH_URL=http://api:5000
      - FRONTEND_URL=${PUBLIC_HOST:-http://localhost}
      - ADMIN_URL=${PUBLIC_HOST:-http://localhost}/admin
      - CORS_ORIGIN=${PUBLIC_HOST:-http://localhost}
      - BASE_URL=${PUBLIC_HOST:-http://localhost}
    volumes:
      - rootline-db:/app/data
      - uploads:/app/public/uploads
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
    networks:
      - rootline-net

  user:
    build:
      context: .
      dockerfile: Dockerfile
      target: user-runner
      args:
        # NEXT_PUBLIC_* baked at build time.
        # PUBLIC_HOST = the host browsers will use to reach this stack.
        #   Local dev:  http://localhost
        #   AWS IP:     http://3.123.45.67   (set PUBLIC_HOST when running compose)
        #   Domain:     https://rootline.tech
        NEXT_PUBLIC_API_URL: ${PUBLIC_HOST:-http://localhost}/api
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_HOST:-http://localhost}
        NEXT_PUBLIC_POSTHOG_KEY: "${NEXT_PUBLIC_POSTHOG_KEY:-}"
        NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-}"
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:?REVALIDATE_SECRET must be set}
      - GEO_LAT=${GEO_LAT:-}
      - GEO_LNG=${GEO_LNG:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
    networks:
      - rootline-net

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-runner
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_HOST:-http://localhost}/api
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_HOST:-http://localhost}
        NEXT_PUBLIC_POSTHOG_KEY: "${NEXT_PUBLIC_POSTHOG_KEY:-}"
        NEXT_PUBLIC_POSTHOG_HOST: "${NEXT_PUBLIC_POSTHOG_HOST:-}"
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:3001/admin"]
    networks:
      - rootline-net

volumes:
  rootline-db:
  uploads:

networks:
  rootline-net:
    driver: bridge
